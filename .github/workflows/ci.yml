name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

jobs:
  # ── Frontend: Lint & Type-check ───────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # @stellar/stellar-sdk@16 requires Node >=22; the lockfile is generated
      # with npm 11, so pin npm 11 on CI to keep `npm ci` deterministic.
      - name: Pin npm 11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run typecheck

      - name: Run frontend unit tests
        run: npm test

  # ── Contracts: Format, Build & Test ──────────────────────────────────────
  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build contracts (release)
        run: cargo build --release --target wasm32v1-none

      - name: Run contract test suite
        run: cargo test --verbose
